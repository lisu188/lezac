name: Audit source paths

on:
  push:
    branches:
      - refactor/modular-source-layout

permissions:
  contents: write

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/modular-source-layout
          fetch-depth: 0
      - run: |
          mkdir -p .split-diagnostics
          grep -RIn --exclude-dir=.git --exclude-dir=.split-diagnostics 'src/main\.cpp\|"src" / "main\.cpp"\|main_cpp' CMakeLists.txt tools tests docs > .split-diagnostics/source-path-references.txt || true
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/audit-source-paths.yml
          git add .split-diagnostics/source-path-references.txt
          git commit -m "Audit source inspection paths after app relocation"
          git push origin HEAD:refactor/modular-source-layout
