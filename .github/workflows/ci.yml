name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: Linux build and full test suite
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libsdl2-dev python3 python3-pil xvfb xdotool dosbox
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: ctest --test-dir build --output-on-failure --timeout 120
      - name: Upload CTest diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-linux-diagnostics
          path: build/Testing/Temporary
          if-no-files-found: error

  windows:
    name: Windows build and full test suite
    runs-on: windows-2025
    timeout-minutes: 45
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-python
            mingw-w64-x86_64-SDL2
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        env:
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: ctest --test-dir build --output-on-failure --timeout 120
      - name: Upload CTest diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-windows-diagnostics
          path: build/Testing/Temporary
          if-no-files-found: error
