name: Diagnose source split

on:
  push:
    branches:
      - refactor/modular-source-layout

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/modular-source-layout
          fetch-depth: 0
      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libsdl2-dev python3 python3-pil xvfb xdotool dosbox
      - run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - run: cmake --build build --parallel
      - name: Capture test diagnostics
        run: |
          set +e
          SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy ctest --test-dir build --output-on-failure --timeout 120 2>&1 | tee ctest-output.txt
          status=${PIPESTATUS[0]}
          mkdir -p .split-diagnostics
          cp ctest-output.txt .split-diagnostics/ctest-output.txt
          grep -nE '__FILE__|parent_path|sourceRoot|source_root|src/main.cpp|src/app/app.cpp' src/app/app.cpp > .split-diagnostics/path-references.txt || true
          printf 'ctest_status=%s\n' "$status" > .split-diagnostics/status.txt
      - name: Commit diagnostics and remove workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/diagnose-source-split.yml
          git add .split-diagnostics
          git commit -m "Capture source split test diagnostics"
          git push origin HEAD:refactor/modular-source-layout
