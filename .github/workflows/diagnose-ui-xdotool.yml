name: Diagnose Xvfb UI smoke

on:
  push:
    branches:
      - refactor/modular-source-layout

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/modular-source-layout
          fetch-depth: 0
      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libsdl2-dev python3 python3-pil xvfb xdotool dosbox
      - run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON
      - run: cmake --build build --parallel
      - run: |
          set +e
          ctest --test-dir build -R '^ui_xdotool_xvfb$' -V --output-on-failure 2>&1 | tee ui-xdotool-output.txt
          mkdir -p .split-diagnostics
          cp ui-xdotool-output.txt .split-diagnostics/ui-xdotool-output.txt
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/diagnose-ui-xdotool.yml
          git add .split-diagnostics/ui-xdotool-output.txt
          git commit -m "Capture isolated Xvfb UI smoke output"
          git push origin HEAD:refactor/modular-source-layout
