name: Release builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    name: Package Linux x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libsdl2-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$PWD/stage/lezac"
      - name: Build and install
        run: |
          cmake --build build --parallel
          cmake --install build
      - name: Package
        run: tar -C stage -czf lezac-linux-x86_64.tar.gz lezac
      - uses: actions/upload-artifact@v4
        with:
          name: lezac-linux-x86_64
          path: lezac-linux-x86_64.tar.gz
          if-no-files-found: error

  windows:
    name: Package Windows x86_64
    runs-on: windows-2025
    timeout-minutes: 30
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            zip
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-SDL2
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF -DCMAKE_INSTALL_PREFIX="$PWD/stage/lezac"
      - name: Build and install
        run: |
          cmake --build build --parallel
          cmake --install build
      - name: Package
        run: |
          cd stage
          zip -r ../lezac-windows-x86_64.zip lezac
      - uses: actions/upload-artifact@v4
        with:
          name: lezac-windows-x86_64
          path: lezac-windows-x86_64.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, windows]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd dist
          sha256sum lezac-linux-x86_64.tar.gz lezac-windows-x86_64.zip > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/lezac-linux-x86_64.tar.gz
            dist/lezac-windows-x86_64.zip
            dist/SHA256SUMS
