name: Source snapshot

on:
  push:
    branches:
      - refactor/split-app-entrypoint
  pull_request:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: tar --exclude=.git -czf source-snapshot.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: source-snapshot
          path: source-snapshot.tar.gz
          if-no-files-found: error
